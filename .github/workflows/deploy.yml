name: Déploiement automatique

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Déclencher le déploiement o2switch
        run: |
          curl -sS -o /dev/null -w "%{http_code}" \
            "https://hls-apps.fr/causeries/deploy.php?token=${{ secrets.DEPLOY_TOKEN }}"
